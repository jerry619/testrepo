name: Test E2E Toggle + Skip Logic

on:
  workflow_dispatch:
    inputs:
      run_import_only:
        description: "Run E2E: import-only"
        required: false
        type: boolean
        default: false
      run_invalid_package:
        description: "Run E2E: invalid-package"
        required: false
        type: boolean
        default: false
      run_on_prem:
        description: "Run E2E: on-prem"
        required: false
        type: boolean
        default: false
      run_others:
        description: "Run E2E: others"
        required: false
        type: boolean
        default: false


jobs:
  test-marker:
    name: Validate E2E Selection Logic

    # ✅ THIS IS THE IMPORTANT SKIP LOGIC (same as production)
    if: >
      github.event.inputs.run_import_only == true ||
      github.event.inputs.run_invalid_package == true ||
      github.event.inputs.run_on_prem == true ||
      github.event.inputs.run_others == true

    runs-on: ubuntu-latest

    steps:
      - name: Show inputs
        run: |
          echo "================ INPUTS ================"
          echo "import-only:     ${{ github.event.inputs.run_import_only }}"
          echo "invalid-package: ${{ github.event.inputs.run_invalid_package }}"
          echo "on-prem:         ${{ github.event.inputs.run_on_prem }}"
          echo "others:          ${{ github.event.inputs.run_others }}"
          echo "========================================"

      - name: Build test-marker
        id: build
        run: |
          TEST_MARKER=""

          if [ "${{ github.event.inputs.run_import_only }}" == "true" ]; then
            TEST_MARKER="$TEST_MARKER import-only"
          fi

          if [ "${{ github.event.inputs.run_invalid_package }}" == "true" ]; then
            TEST_MARKER="$TEST_MARKER invalid-package"
          fi

          if [ "${{ github.event.inputs.run_on_prem }}" == "true" ]; then
            TEST_MARKER="$TEST_MARKER on-prem"
          fi

          if [ "${{ github.event.inputs.run_others }}" == "true" ]; then
            TEST_MARKER="$TEST_MARKER others"
          fi

          TEST_MARKER=$(echo $TEST_MARKER | xargs | tr ' ' ',')

          echo "test-marker=$TEST_MARKER" >> $GITHUB_OUTPUT

      - name: Print final result
        run: |
          echo "================ RESULT ================"
          echo "test-marker: ${{ steps.build.outputs.test-marker }}"
          echo "========================================"

      - name: Validate E2E behavior
        run: |
          echo "E2E WOULD RUN with markers:"
          echo "${{ steps.build.outputs.test-marker }}"
